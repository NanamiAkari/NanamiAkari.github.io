<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    body {
      padding: 18px;
    }

    .flow {
      display: grid;
      grid-template-columns: repeat(3, minmax(210px, 1fr));
      gap: 34px 42px;
      position: relative;
    }

    .node {
      position: relative;
      min-height: 108px;
      padding: 18px 18px 16px;
      border: 1px solid #dbe3ee;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
    }

    .node:nth-child(1)::after,
    .node:nth-child(2)::after,
    .node:nth-child(4)::after,
    .node:nth-child(5)::after {
      content: "";
      position: absolute;
      top: 50%;
      right: -30px;
      width: 22px;
      height: 2px;
      background: #94a3b8;
      transform: translateY(-50%);
    }

    .node:nth-child(1)::before,
    .node:nth-child(2)::before,
    .node:nth-child(4)::before,
    .node:nth-child(5)::before {
      content: "";
      position: absolute;
      top: 50%;
      right: -31px;
      width: 8px;
      height: 8px;
      border-top: 2px solid #94a3b8;
      border-right: 2px solid #94a3b8;
      transform: translateY(-50%) rotate(45deg);
    }

    .node:nth-child(3)::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -24px;
      width: 2px;
      height: 16px;
      background: #94a3b8;
      transform: translateX(-50%);
    }

    .node:nth-child(3)::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -27px;
      width: 8px;
      height: 8px;
      border-right: 2px solid #94a3b8;
      border-bottom: 2px solid #94a3b8;
      transform: translateX(-50%) rotate(45deg);
    }

    .badge {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #10b981);
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.24);
    }

    h3 {
      margin: 10px 0 8px;
      font-size: 17px;
      line-height: 1.3;
    }

    p {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.65;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .flow {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .node:nth-child(n)::before,
      .node:nth-child(n)::after {
        display: none;
      }

      .node:not(:last-child)::after {
        content: "";
        display: block;
        position: absolute;
        left: 50%;
        bottom: -18px;
        width: 2px;
        height: 12px;
        background: #94a3b8;
        transform: translateX(-50%);
      }

      .node:not(:last-child)::before {
        content: "";
        display: block;
        position: absolute;
        left: 50%;
        bottom: -20px;
        width: 8px;
        height: 8px;
        border-right: 2px solid #94a3b8;
        border-bottom: 2px solid #94a3b8;
        transform: translateX(-50%) rotate(45deg);
      }
    }
  </style>
</head>
<body>
  <main class="flow" aria-label="标准字典实验方法流程">
    <section class="node">
      <span class="badge">A</span>
      <h3>目录资源</h3>
      <p>595 条目录资源</p>
    </section>
    <section class="node">
      <span class="badge">B</span>
      <h3>候选字典</h3>
      <p>生成全量候选字典</p>
    </section>
    <section class="node">
      <span class="badge">C</span>
      <h3>评测任务</h3>
      <p>构造 100 条评测任务</p>
    </section>
    <section class="node">
      <span class="badge">D</span>
      <h3>三路对比</h3>
      <p>无字典 / 标准字典 / 关系增强</p>
    </section>
    <section class="node">
      <span class="badge">E</span>
      <h3>指标评估</h3>
      <p>Precision@K / Recall@K / MRR / conceptRecall / relationAccuracy</p>
    </section>
    <section class="node">
      <span class="badge">F</span>
      <h3>人工复核</h3>
      <p>抽样人工复核</p>
    </section>
  </main>
</body>
</html>
