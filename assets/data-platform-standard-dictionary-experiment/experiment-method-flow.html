<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f8fafc;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    body {
      padding: 14px;
    }

    main {
      width: 100%;
      height: 100%;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .mobile-flow {
      display: none;
    }

    .node {
      fill: #fff;
      stroke: #dbe3ee;
      stroke-width: 1.2;
      filter: url(#shadow);
    }

    .badge {
      fill: url(#badge);
    }

    .badge-text {
      fill: #fff;
      font-size: 15px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .title {
      fill: #0f172a;
      font-size: 20px;
      font-weight: 800;
    }

    .desc {
      fill: #475569;
      font-size: 15px;
      line-height: 1.5;
    }

    .arrow {
      stroke: #94a3b8;
      stroke-width: 2.2;
      fill: none;
      marker-end: url(#arrow);
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .desktop-flow {
        display: none;
      }

      .mobile-flow {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main aria-label="标准字典实验方法流程图">
    <svg class="desktop-flow" viewBox="0 0 980 350" role="img" aria-labelledby="desktop-title" preserveAspectRatio="xMidYMid meet">
      <title id="desktop-title">标准字典实验方法流程图</title>
      <defs>
        <linearGradient id="badge" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#2563eb"/>
          <stop offset="100%" stop-color="#10b981"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
          <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
        </filter>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
        </marker>
      </defs>

      <line class="arrow" x1="290" y1="86" x2="350" y2="86"/>
      <line class="arrow" x1="620" y1="86" x2="680" y2="86"/>
      <path class="arrow" d="M 820 130 V 198"/>
      <line class="arrow" x1="690" y1="254" x2="630" y2="254"/>
      <line class="arrow" x1="360" y1="254" x2="300" y2="254"/>

      <g>
        <rect class="node" x="30" y="42" width="260" height="88" rx="14"/>
        <circle class="badge" cx="58" cy="70" r="14"/>
        <text class="badge-text" x="58" y="70">A</text>
        <text class="title" x="84" y="76">目录资源</text>
        <text class="desc" x="84" y="104">595 条目录资源</text>
      </g>

      <g>
        <rect class="node" x="360" y="42" width="260" height="88" rx="14"/>
        <circle class="badge" cx="388" cy="70" r="14"/>
        <text class="badge-text" x="388" y="70">B</text>
        <text class="title" x="414" y="76">候选字典</text>
        <text class="desc" x="414" y="104">生成全量候选字典</text>
      </g>

      <g>
        <rect class="node" x="690" y="42" width="260" height="88" rx="14"/>
        <circle class="badge" cx="718" cy="70" r="14"/>
        <text class="badge-text" x="718" y="70">C</text>
        <text class="title" x="744" y="76">评测任务</text>
        <text class="desc" x="744" y="104">构造 100 条评测任务</text>
      </g>

      <g>
        <rect class="node" x="690" y="210" width="260" height="88" rx="14"/>
        <circle class="badge" cx="718" cy="238" r="14"/>
        <text class="badge-text" x="718" y="238">D</text>
        <text class="title" x="744" y="244">三路对比</text>
        <text class="desc" x="744" y="272">无字典 / 标准字典 / 关系增强</text>
      </g>

      <g>
        <rect class="node" x="360" y="210" width="260" height="88" rx="14"/>
        <circle class="badge" cx="388" cy="238" r="14"/>
        <text class="badge-text" x="388" y="238">E</text>
        <text class="title" x="414" y="244">指标评估</text>
        <text class="desc" x="414" y="270">
          <tspan x="414" dy="0">Precision@K / Recall@K / MRR</tspan>
          <tspan x="414" dy="20">conceptRecall / relationAccuracy</tspan>
        </text>
      </g>

      <g>
        <rect class="node" x="30" y="210" width="260" height="88" rx="14"/>
        <circle class="badge" cx="58" cy="238" r="14"/>
        <text class="badge-text" x="58" y="238">F</text>
        <text class="title" x="84" y="244">人工复核</text>
        <text class="desc" x="84" y="272">抽样人工复核</text>
      </g>
    </svg>

    <svg class="mobile-flow" viewBox="0 0 360 720" role="img" aria-labelledby="mobile-title" preserveAspectRatio="xMidYMid meet">
      <title id="mobile-title">标准字典实验方法流程图</title>
      <defs>
        <linearGradient id="badge-mobile" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="#2563eb"/>
          <stop offset="100%" stop-color="#10b981"/>
        </linearGradient>
        <filter id="shadow-mobile" x="-20%" y="-30%" width="140%" height="170%">
          <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
        </filter>
        <marker id="arrow-mobile" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
        </marker>
      </defs>

      <g class="mobile-node">
        <rect class="node" x="24" y="16" width="312" height="84" rx="14" filter="url(#shadow-mobile)"/>
        <circle fill="url(#badge-mobile)" cx="54" cy="44" r="14"/>
        <text class="badge-text" x="54" y="44">A</text>
        <text class="title" x="82" y="50">目录资源</text>
        <text class="desc" x="82" y="78">595 条目录资源</text>
      </g>
      <line class="arrow" marker-end="url(#arrow-mobile)" x1="180" y1="104" x2="180" y2="136"/>

      <g class="mobile-node">
        <rect class="node" x="24" y="140" width="312" height="84" rx="14" filter="url(#shadow-mobile)"/>
        <circle fill="url(#badge-mobile)" cx="54" cy="168" r="14"/>
        <text class="badge-text" x="54" y="168">B</text>
        <text class="title" x="82" y="174">候选字典</text>
        <text class="desc" x="82" y="202">生成全量候选字典</text>
      </g>
      <line class="arrow" marker-end="url(#arrow-mobile)" x1="180" y1="228" x2="180" y2="260"/>

      <g class="mobile-node">
        <rect class="node" x="24" y="264" width="312" height="84" rx="14" filter="url(#shadow-mobile)"/>
        <circle fill="url(#badge-mobile)" cx="54" cy="292" r="14"/>
        <text class="badge-text" x="54" y="292">C</text>
        <text class="title" x="82" y="298">评测任务</text>
        <text class="desc" x="82" y="326">构造 100 条评测任务</text>
      </g>
      <line class="arrow" marker-end="url(#arrow-mobile)" x1="180" y1="352" x2="180" y2="384"/>

      <g class="mobile-node">
        <rect class="node" x="24" y="388" width="312" height="84" rx="14" filter="url(#shadow-mobile)"/>
        <circle fill="url(#badge-mobile)" cx="54" cy="416" r="14"/>
        <text class="badge-text" x="54" y="416">D</text>
        <text class="title" x="82" y="422">三路对比</text>
        <text class="desc" x="82" y="450">无字典 / 标准字典 / 关系增强</text>
      </g>
      <line class="arrow" marker-end="url(#arrow-mobile)" x1="180" y1="476" x2="180" y2="508"/>

      <g class="mobile-node">
        <rect class="node" x="24" y="512" width="312" height="96" rx="14" filter="url(#shadow-mobile)"/>
        <circle fill="url(#badge-mobile)" cx="54" cy="540" r="14"/>
        <text class="badge-text" x="54" y="540">E</text>
        <text class="title" x="82" y="546">指标评估</text>
        <text class="desc" x="82" y="574">
          <tspan x="82" dy="0">Precision@K / Recall@K / MRR</tspan>
          <tspan x="82" dy="20">conceptRecall / relationAccuracy</tspan>
        </text>
      </g>
      <line class="arrow" marker-end="url(#arrow-mobile)" x1="180" y1="612" x2="180" y2="644"/>

      <g class="mobile-node">
        <rect class="node" x="24" y="648" width="312" height="64" rx="14" filter="url(#shadow-mobile)"/>
        <circle fill="url(#badge-mobile)" cx="54" cy="680" r="14"/>
        <text class="badge-text" x="54" y="680">F</text>
        <text class="title" x="82" y="676">人工复核</text>
        <text class="desc" x="82" y="700">抽样人工复核</text>
      </g>
    </svg>
  </main>
</body>
</html>
